version: 2

sources:
  - name: raw
    description: Raw data from source systems
    database: destdb
    schema: public
    tables:
      - name: orders
        description: Raw orders from PostgreSQL source
        columns:
          - name: order_id
            tests:
              - unique
              - not_null
          - name: customer_id
            tests:
              - not_null
          - name: total_amount
            tests:
              - not_null
          - name: status
            tests:
              - not_null
              - accepted_values:
                  values: ['pending', 'processing', 'shipped', 'delivered', 'cancelled']

      - name: customers
        description: Raw customer data
        columns:
          - name: customer_id
            tests:
              - unique
              - not_null
          - name: email
            tests:
              - unique
              - not_null

      - name: products
        description: Raw product inventory
        columns:
          - name: product_id
            tests:
              - unique
              - not_null
          - name: price
            tests:
              - not_null

      - name: order_items
        description: Line items for every order
        columns:
          - name: item_id
            tests:
              - unique
              - not_null
          - name: order_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null