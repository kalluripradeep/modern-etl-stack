modern_etl:
  target: dev
  outputs:
    dev:
      type: postgres
      # DEST_DB_HOST defaults to Docker name; override to K8s DNS in production:
      # e.g. postgres-dest.etl.svc.cluster.local
      host: "{{ env_var('DEST_DB_HOST', 'postgres-dest') }}"
      port: "{{ env_var('DEST_DB_PORT', '5432') | int }}"
      user: "{{ env_var('DEST_DB_USER', 'destuser') }}"
      password: "{{ env_var('DEST_DB_PASSWORD', 'destpass') }}"
      dbname: "{{ env_var('DEST_DB_NAME', 'destdb') }}"
      schema: analytics
      threads: 4
