name: CI

on:
  push:
    branches: [ "main", "feature/enterprise-architecture" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r docker/airflow/requirements-airflow.txt

    - name: Parse Airflow DAGs
      run: |
        python -m py_compile airflow/dags/*.py

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.12.0

    - name: Helm Lint
      run: |
        helm lint helm/etl-stack/

    - name: dbt parse (Compile Check)
      run: |
        # Set dummy env vars for parsing
        export SOURCE_DB_HOST=localhost DEST_DB_HOST=localhost SOURCE_DB_PASSWORD=pwd DEST_DB_PASSWORD=pwd
        cd dbt && dbt parse
