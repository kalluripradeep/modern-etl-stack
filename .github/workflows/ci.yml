name: Enterprise CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check airflow/ scripts/ dbt-mcp/src/ || true

  lint-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install SQLFluff
        run: pip install sqlfluff dbt-postgres
      - name: Lint dbt SQL models
        run: sqlfluff lint dbt/models --dialect postgres || true

  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './k8s'
        continue-on-error: true

  dbt-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: destuser
          POSTGRES_PASSWORD: destpass
          POSTGRES_DB: destdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dbt
        run: pip install dbt-core dbt-postgres
      - name: Run dbt test
        env:
          DEST_DB_HOST: localhost
          DEST_DB_USER: destuser
          DEST_DB_PASSWORD: destpass
          DEST_DB_NAME: destdb
          DEST_DB_PORT: '5432'
        run: |
          cd dbt
          dbt debug
          dbt deps
          dbt seed || true
          dbt run || true
          dbt test || true

  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0
      - name: Helm Lint
        run: helm lint helm/etl-stack/

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Airflow Docker Image (Dry Run)
        run: docker build -t test-airflow -f docker/airflow/Dockerfile docker/airflow/ || true

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install mypy
        run: pip install mypy types-requests
      - name: Run Mypy
        run: mypy airflow/dags/ || true

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Yamllint
        run: |
          pip install yamllint
          yamllint . || true

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v15
        with:
          globs: "**/*.md"
        continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r airflow/ scripts/ || true
