---
# postgres-exporter scrapes pg_stat_statements and pg_stat_* views from both
# PostgreSQL databases and exposes them as Prometheus metrics.
# This is required by any Grafana PostgreSQL dashboard (e.g. ID 9628).
#
# NOTE: Dashboard 9948 (PostgreSQL Infrastructure) requires TimescaleDB and
# collectd, which are NOT standard PostgreSQL. Use dashboard ID 9628 instead —
# it works with plain postgres_exporter + pg_stat_statements.

# ── Source DB exporter ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter-source
  namespace: etl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter-source
  template:
    metadata:
      labels:
        app: postgres-exporter-source
    spec:
      containers:
      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:v0.15.0
        ports:
        - containerPort: 9187
        env:
        - name: DATA_SOURCE_NAME
          value: "postgresql://sourceuser:sourcepass@postgres-source-0.postgres-source.etl.svc.cluster.local:5432/sourcedb?sslmode=disable"
        - name: PG_EXPORTER_AUTO_DISCOVER_DATABASES
          value: "true"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter-source
  namespace: etl
spec:
  selector:
    app: postgres-exporter-source
  ports:
  - port: 9187
    targetPort: 9187
---
# ── Destination DB exporter ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter-dest
  namespace: etl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter-dest
  template:
    metadata:
      labels:
        app: postgres-exporter-dest
    spec:
      containers:
      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:v0.15.0
        ports:
        - containerPort: 9187
        env:
        - name: DATA_SOURCE_NAME
          value: "postgresql://destuser:destpass@postgres-dest-0.postgres-dest.etl.svc.cluster.local:5432/destdb?sslmode=disable"
        - name: PG_EXPORTER_AUTO_DISCOVER_DATABASES
          value: "true"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter-dest
  namespace: etl
spec:
  selector:
    app: postgres-exporter-dest
  ports:
  - port: 9187
    targetPort: 9187
