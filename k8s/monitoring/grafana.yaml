apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: etl
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus.etl.svc.cluster.local:9090
      isDefault: true
    - name: PostgreSQL Warehouse
      type: postgres
      url: postgres-dest.etl.svc.cluster.local:5432
      database: destdb
      user: destuser
      secureJsonData:
        password: destpass
      jsonData:
        sslmode: disable
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: etl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.2.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: etl-secrets
              key: AIRFLOW_ADMIN_USER   # reusing admin user for grafana
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: etl-secrets
              key: AIRFLOW_ADMIN_PASSWORD
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        volumeMounts:
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: grafana-data
          mountPath: /var/lib/grafana
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: grafana-datasources
        configMap:
          name: grafana-datasources
      - name: grafana-data
        emptyDir: {}   # use a PVC in production for persistence
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: etl
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30300   # access Grafana at http://NODE_IP:30300
