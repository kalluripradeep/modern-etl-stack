apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: etl
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus.etl.svc.cluster.local:9090
      isDefault: true
    - name: PostgreSQL Warehouse
      type: postgres
      url: postgres-dest.etl.svc.cluster.local:5432
      database: destdb
      user: destuser
      secureJsonData:
        password: destpass
      jsonData:
        sslmode: disable
---
# Dashboard provisioning config: tells Grafana WHERE to load dashboards from
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: etl
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: default
      type: file
      updateIntervalSeconds: 10
      options:
        path: /var/lib/grafana/dashboards
---
# Node Exporter Full dashboard stub (Grafana ID 1860).
# On first boot Grafana will show this placeholder. For the full dashboard,
# use: Dashboards → Import → ID 1860 (one-time manual step, persisted to PVC in prod).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: etl
data:
  node-exporter-full.json: |
    {
      "uid": "node-exporter-full",
      "title": "Node Exporter Full",
      "tags": ["node-exporter", "infrastructure"],
      "timezone": "browser",
      "schemaVersion": 27,
      "version": 1,
      "refresh": "1m",
      "panels": [
        {
          "type": "text",
          "title": "How to load the full dashboard",
          "gridPos": { "h": 5, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "## Node Exporter Full (Grafana ID 1860)\n\nThis placeholder is auto-provisioned. To load the **complete** 30-panel dashboard:\n\n1. Open **Dashboards → Import**\n2. Enter ID **`1860`** and click **Load**\n3. Select **Prometheus** as the data source\n4. Click **Import**\n\nSee [grafana.com/dashboards/1860](https://grafana.com/grafana/dashboards/1860-node-exporter-full/) for details."
          }
        }
      ],
      "templating": { "list": [] },
      "annotations": { "list": [] }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: etl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.2.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: etl-secrets
              key: AIRFLOW_ADMIN_USER
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: etl-secrets
              key: AIRFLOW_ADMIN_PASSWORD
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        volumeMounts:
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: grafana-dashboard-providers
          mountPath: /etc/grafana/provisioning/dashboards
        - name: grafana-dashboards
          mountPath: /var/lib/grafana/dashboards
        - name: grafana-data
          mountPath: /var/lib/grafana
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: grafana-datasources
        configMap:
          name: grafana-datasources
      - name: grafana-dashboard-providers
        configMap:
          name: grafana-dashboard-providers
      - name: grafana-dashboards
        configMap:
          name: grafana-dashboards
      - name: grafana-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: etl
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30300
