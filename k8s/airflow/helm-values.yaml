# Airflow Helm Chart values for Kubernetes deployment
# Install: helm install airflow apache-airflow/airflow -n etl -f k8s/airflow/helm-values.yaml

executor: KubernetesExecutor

images:
  airflow:
    repository: YOUR_REGISTRY/airflow-etl
    tag: latest
    pullPolicy: Always

serviceAccount:
  create: true
  name: airflow

dags:
  gitSync:
    enabled: true
    repo: https://github.com/kalluripradeep/modern-etl-stack.git
    branch: main
    subPath: airflow/dags
    period: 60s

# Use extraEnv for all environment variables that use valueFrom
# This bypasses the strict schema validation of the default 'env' block
extraEnv:
  - name: SOURCE_DB_HOST
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: SOURCE_DB_HOST
  - name: SOURCE_DB_PORT
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: SOURCE_DB_PORT
  - name: DEST_DB_HOST
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: DEST_DB_HOST
  - name: DEST_DB_PORT
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: DEST_DB_PORT
  - name: MINIO_ENDPOINT
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: MINIO_ENDPOINT
  - name: KAFKA_BOOTSTRAP
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: KAFKA_BOOTSTRAP
  - name: SPARK_MASTER_URL
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: SPARK_MASTER_URL
  - name: KAFKA_CONNECT_URL
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: KAFKA_CONNECT_URL
  - name: BRONZE_BUCKET
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: BRONZE_BUCKET
  - name: SILVER_BUCKET
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: SILVER_BUCKET
  - name: ETL_CHUNK_SIZE
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: ETL_CHUNK_SIZE
  - name: CDC_MAX_MESSAGES
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: CDC_MAX_MESSAGES
  - name: CDC_COMMIT_EVERY
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: CDC_COMMIT_EVERY
  - name: SPARK_EXECUTOR_MEMORY
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: SPARK_EXECUTOR_MEMORY
  - name: SPARK_EXECUTOR_CORES
    valueFrom:
      configMapKeyRef:
        name: etl-env
        key: SPARK_EXECUTOR_CORES
  - name: AIRFLOW_CONN_SPARK_DEFAULT
    value: "spark://spark-master.etl.svc.cluster.local:7077"

extraEnvFrom:
  - secretRef:
      name: etl-secrets

# S3A / MinIO configuration for logs and data access
# These are used by the SparkSubmitOperator and S3Hook
# We use the standard extraEnv for these to avoid schema conflicts

extraVolumeMounts:
  - name: dbt-project
    mountPath: /opt/airflow/dbt

extraVolumes:
  - name: dbt-project
    configMap:
      name: dbt-project

postgresql:
  enabled: true

redis:
  enabled: false

scheduler:
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

webserver:
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  service:
    type: NodePort
    ports:
      - name: airflow-ui
        port: 8080
        targetPort: 8080
        nodePort: 30880

webserverSecretKey: "etl-secret-key-change-in-production"
