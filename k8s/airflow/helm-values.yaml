# Airflow Helm Chart values for Kubernetes deployment
# Install: helm install airflow apache-airflow/airflow -n etl -f k8s/airflow/helm-values.yaml
#
# BEFORE deploying:
# 1. Build and push the custom Airflow image:
#    docker build -t YOUR_REGISTRY/airflow-etl:latest -f docker/airflow/Dockerfile .
#    docker push YOUR_REGISTRY/airflow-etl:latest
# 2. Replace YOUR_REGISTRY below with your actual registry

executor: KubernetesExecutor

images:
  airflow:
    repository: YOUR_REGISTRY/airflow-etl   # <-- replace with your registry
    tag: latest
    pullPolicy: Always

# Service account for KubernetesExecutor to launch pods
serviceAccount:
  create: true
  name: airflow

# Pull DAGs from git — no need to rebuild image for every DAG change
dags:
  gitSync:
    enabled: true
    repo: https://github.com/kalluripradeep/modern-etl-stack.git
    branch: main
    subPath: airflow/dags
    period: 60s

# All service endpoints and scale settings
env:
- name: SOURCE_DB_HOST
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: SOURCE_DB_HOST
- name: SOURCE_DB_PORT
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: SOURCE_DB_PORT
- name: DEST_DB_HOST
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: DEST_DB_HOST
- name: DEST_DB_PORT
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: DEST_DB_PORT
- name: MINIO_ENDPOINT
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: MINIO_ENDPOINT
- name: KAFKA_BOOTSTRAP
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: KAFKA_BOOTSTRAP
- name: SPARK_MASTER_URL
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: SPARK_MASTER_URL
- name: KAFKA_CONNECT_URL
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: KAFKA_CONNECT_URL
- name: BRONZE_BUCKET
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: BRONZE_BUCKET
- name: SILVER_BUCKET
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: SILVER_BUCKET
- name: ETL_CHUNK_SIZE
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: ETL_CHUNK_SIZE
- name: CDC_MAX_MESSAGES
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: CDC_MAX_MESSAGES
- name: CDC_COMMIT_EVERY
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: CDC_COMMIT_EVERY
- name: SPARK_EXECUTOR_MEMORY
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: SPARK_EXECUTOR_MEMORY
- name: SPARK_EXECUTOR_CORES
  valueFrom:
    configMapKeyRef:
      name: etl-env
      key: SPARK_EXECUTOR_CORES

extraEnvFrom:
- secretRef:
    name: etl-secrets

# Spark connection for SparkSubmitOperator
extraEnv:
- name: AIRFLOW_CONN_SPARK_DEFAULT
  value: "spark://spark-master.etl.svc.cluster.local:7077"

# dbt path inside the custom Airflow image
extraVolumeMounts:
- name: dbt-project
  mountPath: /opt/airflow/dbt

extraVolumes:
- name: dbt-project
  configMap:
    name: dbt-project   # created by deploy.sh from the dbt/ folder

# Use built-in PostgreSQL for Airflow metadata
postgresql:
  enabled: true

# Redis not needed with KubernetesExecutor
redis:
  enabled: false

scheduler:
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

webserver:
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  service:
    type: NodePort
    ports:
      - name: airflow-ui
        port: 8080
        targetPort: 8080
        nodePort: 30880   # access Airflow UI at http://NODE_IP:30880

# Default admin user (change password in production)
webserverSecretKey: "etl-secret-key-change-in-production"
