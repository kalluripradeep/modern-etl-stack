apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: etl
spec:
  selector:
    app: minio
  ports:
  - name: api
    port: 9000
    targetPort: 9000
  - name: console
    port: 9001
    targetPort: 9001
---
# NodePort for accessing MinIO console during testing
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: etl
spec:
  type: NodePort
  selector:
    app: minio
  ports:
  - name: console
    port: 9001
    targetPort: 9001
    nodePort: 30901
