apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-source
  namespace: etl
spec:
  serviceName: postgres-source
  replicas: 1
  selector:
    matchLabels:
      app: postgres-source
  template:
    metadata:
      labels:
        app: postgres-source
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: etl-secrets
              key: SOURCE_DB_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: etl-secrets
              key: SOURCE_DB_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: etl-secrets
              key: SOURCE_DB_NAME
        # WAL settings required for Debezium CDC
        args:
        - postgres
        - -c
        - wal_level=logical
        - -c
        - max_replication_slots=10
        - -c
        - max_wal_senders=10
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: postgres-source-data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "sourceuser"]
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "sourceuser"]
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: postgres-source-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: standard   # change to gp3 on AWS, pd-ssd on GCP
      resources:
        requests:
          storage: 10Gi
