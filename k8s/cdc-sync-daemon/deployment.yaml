apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdc-sync-daemon
  namespace: etl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cdc-sync-daemon
  template:
    metadata:
      labels:
        app: cdc-sync-daemon
    spec:
      containers:
      - name: daemon
        image: cdc-sync-daemon:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: etl-env
        - secretRef:
            name: etl-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "250m"
