apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: etl
spec:
  replicas: 2   # increase replicas for more parallelism on large datasets
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      containers:
      - name: spark-worker
        image: bitnami/spark:3.5.1
        env:
        - name: SPARK_MODE
          value: worker
        - name: SPARK_WORKER_MEMORY
          value: "2G"       # increase to 8G for 50GB datasets
        - name: SPARK_WORKER_CORES
          value: "2"        # increase to 4 for large datasets
        - name: SPARK_RPC_AUTHENTICATION_ENABLED
          value: "no"
        - name: SPARK_RPC_ENCRYPTION_ENABLED
          value: "no"
        # S3A / MinIO config for workers
        - name: SPARK_EXTRA_CLASSPATH
          value: "/opt/bitnami/spark/jars/hadoop-aws-*.jar:/opt/bitnami/spark/jars/aws-java-sdk-bundle-*.jar"
        envFrom:
        - configMapRef:
            name: etl-env
        - secretRef:
            name: etl-secrets
        ports:
        - containerPort: 8081
        resources:
          requests:
            memory: "2Gi"   # increase to 8Gi for 50GB datasets
            cpu: "500m"
          limits:
            memory: "4Gi"   # increase to 16Gi for 50GB datasets
            cpu: "2"
