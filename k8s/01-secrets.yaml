# Change these values before deploying to production.
# For testing the defaults work as-is.
apiVersion: v1
kind: Secret
metadata:
  name: etl-secrets
  namespace: etl
type: Opaque
stringData:
  SOURCE_DB_USER: sourceuser
  SOURCE_DB_PASSWORD: sourcepass
  SOURCE_DB_NAME: sourcedb
  DEST_DB_USER: destuser
  DEST_DB_PASSWORD: destpass
  DEST_DB_NAME: destdb
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin123
  AIRFLOW_ADMIN_USER: admin
  AIRFLOW_ADMIN_PASSWORD: admin123
