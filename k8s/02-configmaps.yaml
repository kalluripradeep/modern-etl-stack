apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: etl
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'node-exporter'
        static_configs:
          - targets: ['node-exporter.etl.svc.cluster.local:9100']

      - job_name: 'airflow'
        static_configs:
          - targets: ['airflow-webserver.etl.svc.cluster.local:8080']
        metrics_path: '/admin/metrics'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: etl-env
  namespace: etl
data:
  SOURCE_DB_HOST: "postgres-source.etl.svc.cluster.local"
  SOURCE_DB_PORT: "5432"
  DEST_DB_HOST: "postgres-dest.etl.svc.cluster.local"
  DEST_DB_PORT: "5432"
  MINIO_ENDPOINT: "http://minio.etl.svc.cluster.local:9000"
  KAFKA_BOOTSTRAP: "kafka.etl.svc.cluster.local:9092"
  SPARK_MASTER_URL: "spark://spark-master.etl.svc.cluster.local:7077"
  KAFKA_CONNECT_URL: "http://kafka-connect.etl.svc.cluster.local:8083"
  BRONZE_BUCKET: "bronze"
  SILVER_BUCKET: "silver"
  # Scale these up for large datasets (50GB+)
  ETL_CHUNK_SIZE: "10000"
  CDC_MAX_MESSAGES: "100"
  CDC_COMMIT_EVERY: "100"
  SPARK_EXECUTOR_MEMORY: "2g"
  SPARK_EXECUTOR_CORES: "2"
