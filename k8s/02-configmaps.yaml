apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: etl
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'node-exporter'
        static_configs:
          - targets: ['node-exporter.etl.svc.cluster.local:9100']

      - job_name: 'airflow'
        static_configs:
          - targets: ['airflow-webserver.etl.svc.cluster.local:8080']
        metrics_path: '/admin/metrics'

      - job_name: 'postgres-source'
        static_configs:
          - targets: ['postgres-exporter-source.etl.svc.cluster.local:9187']
        labels:
          db_instance: source

      - job_name: 'postgres-dest'
        static_configs:
          - targets: ['postgres-exporter-dest.etl.svc.cluster.local:9187']
        labels:
          db_instance: destination

      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
        - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
        - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: default;kubernetes;https

      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
        - role: node
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)

      - job_name: 'kubernetes-cadvisor'
        scheme: https
        metrics_path: /metrics/cadvisor
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
        - role: node
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)

      - job_name: 'minio'
        metrics_path: /minio/v2/metrics/cluster
        scheme: http
        static_configs:
          - targets: ['minio-0.minio.etl.svc.cluster.local:9000']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: etl-env
  namespace: etl
data:
  SOURCE_DB_HOST: "postgres-source-0.postgres-source.etl.svc.cluster.local"
  SOURCE_DB_PORT: "5432"
  DEST_DB_HOST: "postgres-dest-0.postgres-dest.etl.svc.cluster.local"
  DEST_DB_PORT: "5432"
  MINIO_ENDPOINT: "http://minio-0.minio.etl.svc.cluster.local:9000"
  KAFKA_BOOTSTRAP: "kafka-0.kafka.etl.svc.cluster.local:9092"
  SPARK_MASTER_URL: "spark://spark-master-0.spark-master.etl.svc.cluster.local:7077"
  KAFKA_CONNECT_URL: "http://kafka-connect-0.kafka-connect.etl.svc.cluster.local:8083"
  BRONZE_BUCKET: "bronze"
  SILVER_BUCKET: "silver"
  # Scale these up for large datasets (50GB+)
  ETL_CHUNK_SIZE: "10000"
  CDC_MAX_MESSAGES: "100"
  CDC_COMMIT_EVERY: "100"
  SPARK_EXECUTOR_MEMORY: "2g"
  SPARK_EXECUTOR_CORES: "2"
