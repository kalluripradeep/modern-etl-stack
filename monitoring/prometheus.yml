# Prometheus Configuration
# Service names default to Docker Compose container names.
# In Kubernetes, override these via ConfigMap with K8s DNS names:
#   node-exporter     → node-exporter.etl.svc.cluster.local
#   airflow-webserver → airflow-webserver.etl.svc.cluster.local
#   kafka-jmx         → kafka-jmx-exporter.etl.svc.cluster.local

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow-webserver:8080']
    metrics_path: '/admin/metrics'

  # Kafka JMX metrics — requires JMX Exporter sidecar on port 7071
  # Uncomment and set KAFKA_JMX_HOST when deploying to K8s:
  # - job_name: 'kafka'
  #   static_configs:
  #     - targets: ['kafka-jmx-exporter:7071']
