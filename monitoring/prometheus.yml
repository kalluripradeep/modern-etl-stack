# Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (System metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Airflow (if metrics exposed)
  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow-webserver:8080']
    metrics_path: '/admin/metrics'

  # Kafka JMX Metrics
  # NOTE: Kafka's broker port (9092) is not a Prometheus metrics endpoint.
  # To scrape Kafka metrics, add a JMX Exporter sidecar and point to its port
  # (typically 7071 or 9999). Example:
  #
  # - job_name: 'kafka'
  #   static_configs:
  #     - targets: ['kafka-jmx-exporter:7071']
