apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: etl-kafka
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "etl-stack.labels" . | nindent 4 }}
spec:
  kafka:
    version: {{ .Values.kafka.version | default "3.5.0" | quote }}
    replicas: {{ .Values.kafka.replicas | default 1 }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      inter.broker.protocol.version: {{ .Values.kafka.interBrokerProtocolVersion | default "3.5" | quote }}
    storage:
      type: ephemeral
  zookeeper:
    replicas: 1
    storage:
      type: ephemeral
